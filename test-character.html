<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Character Preview</title>
<style>
body { margin:0; background:#1a1828; display:flex; align-items:center; justify-content:center; height:100vh; }
canvas { border:2px solid #333; border-radius:12px; }
</style>
</head>
<body>
<canvas id="c" width="400" height="400"></canvas>
<script>
const ctx = document.getElementById('c').getContext('2d');
const x=200, y=200, s=80;

// Helper: draw potato shape
function potatoShape(bx,by,rx,ry,body,outline){
  ctx.fillStyle=body; ctx.strokeStyle=outline; ctx.lineWidth=3;
  ctx.beginPath();
  ctx.moveTo(bx-rx*0.9, by-ry*0.3);
  ctx.bezierCurveTo(bx-rx, by-ry*0.8, bx-rx*0.3, by-ry, bx+rx*0.2, by-ry*0.85);
  ctx.bezierCurveTo(bx+rx*0.9, by-ry*0.7, bx+rx, by+ry*0.2, bx+rx*0.8, by+ry*0.6);
  ctx.bezierCurveTo(bx+rx*0.5, by+ry*0.95, bx-rx*0.4, by+ry*0.9, bx-rx*0.9, by+ry*0.4);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  // Eyespots
  ctx.fillStyle=outline+'aa';
  ctx.beginPath(); ctx.ellipse(bx-rx*0.3, by-ry*0.1, rx*0.12, ry*0.08, 0.3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(bx+rx*0.25, by+ry*0.15, rx*0.1, ry*0.07, -0.4, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(bx+rx*0.1, by-ry*0.4, rx*0.08, ry*0.06, 0.6, 0, Math.PI*2); ctx.fill();
  // Sprout
  ctx.fillStyle='#448833'; ctx.strokeStyle='#336622'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.ellipse(bx, by-ry*0.9, rx*0.15, ry*0.25, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.fillStyle='#55aa44';
  ctx.beginPath(); ctx.ellipse(bx-rx*0.12, by-ry*1.05, rx*0.12, ry*0.08, -0.8, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(bx+rx*0.12, by-ry*1.0, rx*0.1, ry*0.07, 0.8, 0, Math.PI*2); ctx.fill();
}

// Eyes
function normalEyes(bx,by,sz){
  const eo=sz*0.28, ey=by-sz*0.12, es=Math.max(3,sz*0.12), ps=Math.max(1.5,es*0.45);
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(bx-eo, ey, es, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(bx+eo, ey, es, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle='#222';
  ctx.beginPath(); ctx.arc(bx-eo, ey, ps, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(bx+eo, ey, ps, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(bx-eo+1, ey-1, Math.max(0.8,es*0.2), 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(bx+eo+1, ey-1, Math.max(0.8,es*0.2), 0, Math.PI*2); ctx.fill();
}

function wideEyes(bx,by,sz){
  const eo=sz*0.28, ey=by-sz*0.12, es=Math.max(3,sz*0.12)*1.1;
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(bx-eo, ey, es, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(bx+eo, ey, es, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle='#333';
  ctx.beginPath(); ctx.arc(bx-eo+0.5, ey, es*0.45, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(bx+eo+0.5, ey, es*0.45, 0, Math.PI*2); ctx.fill();
}

function squintEyes(bx,by,sz){
  ctx.strokeStyle='#222'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(bx-sz*0.28, by-sz*0.12, sz*0.12, -0.8, -0.2); ctx.stroke();
  ctx.beginPath(); ctx.arc(bx+sz*0.28, by-sz*0.12, sz*0.12, -0.8, -0.2); ctx.stroke();
}

function shineEyes(bx,by,sz){
  ctx.fillStyle='#fff8cc';
  const eo=sz*0.28, ey=by-sz*0.12, es=Math.max(3,sz*0.12);
  ctx.beginPath(); ctx.arc(bx-eo, ey, es, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(bx+eo, ey, es, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle='#cc9900';
  ctx.beginPath(); ctx.arc(bx-eo, ey, es*0.45, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(bx+eo, ey, es*0.45, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(bx-eo+1, ey-1, es*0.25, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(bx+eo+1, ey-1, es*0.25, 0, Math.PI*2); ctx.fill();
}

function redEyes(bx,by,sz){
  const eo=sz*0.28, ey=by-sz*0.12, es=Math.max(3,sz*0.12);
  ctx.fillStyle='#ff2222';
  ctx.shadowColor='#ff0000'; ctx.shadowBlur=12;
  ctx.beginPath(); ctx.arc(bx-eo, ey, es, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(bx+eo, ey, es, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur=0;
  ctx.fillStyle='#000';
  ctx.beginPath(); ctx.arc(bx-eo, ey, es*0.45, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(bx+eo, ey, es*0.45, 0, Math.PI*2); ctx.fill();
}

function angryEyes(bx,by,sz){
  ctx.strokeStyle='#000'; ctx.lineWidth=2;
  const eo=sz*0.28, ey=by-sz*0.12, es=Math.max(3,sz*0.12);
  ctx.beginPath(); ctx.moveTo(bx-eo-es, ey-es*0.5); ctx.lineTo(bx-eo+es, ey+es*0.5); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(bx-eo-es, ey+es*0.5); ctx.lineTo(bx-eo+es, ey-es*0.5); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(bx+eo-es, ey-es*0.5); ctx.lineTo(bx+eo+es, ey+es*0.5); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(bx+eo-es, ey+es*0.5); ctx.lineTo(bx+eo+es, ey-es*0.5); ctx.stroke();
}

// Shadow
function shadow(bx,by,sz){
  ctx.fillStyle='rgba(0,0,0,0.35)';
  ctx.beginPath(); ctx.ellipse(bx, by+sz*0.7, sz*0.8, sz*0.3, 0, 0, Math.PI*2); ctx.fill();
}

// Kartoffel
shadow(x,y,s); potatoShape(x,y,s,s,'#e8b84b','#c89830'); normalEyes(x,y,s);
ctx.fillStyle='#fff'; ctx.font='bold 14px Outfit'; ctx.textAlign='center';
ctx.fillText('🥔 Kartoffel', x, y+s+24);
ctx.fillStyle='rgba(255,255,255,0.3)'; ctx.font='12px Outfit';
ctx.fillText('Augenflecken, grüner Sprout', x, y+s+40);

</script>
</body>
</html>
